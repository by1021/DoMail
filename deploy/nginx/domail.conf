# DoMail production site example.
# Replace `mail.example.com` with your real domain before enabling.
# This config serves only the current domain via `server_name`.
# Keep the 80 server for HTTP fallback handling.
# Ensure the certificate files exist before enabling the 443 server.
# Deploy the frontend build to a readable path such as `/opt/domain-mail/frontend/dist`.
# Do NOT use a path under `/root`, otherwise Nginx commonly returns 403 Forbidden.
# The backend upstream at `127.0.0.1:3001` is typically managed by PM2 on the same host.
#
# Cloudflare notes:
# 1. `mail.example.com` can be proxied by Cloudflare (orange cloud) for Web traffic.
# 2. MX / SMTP hostnames should stay DNS only, not proxied by standard Cloudflare.
# 3. Replace the Cloudflare IP list below with the latest official ranges before production use:
#    https://www.cloudflare.com/ips/
# 4. With Cloudflare enabled, prefer SSL/TLS mode "Full (strict)".
#    This config also avoids redirect loops when Cloudflare forwards HTTPS visitor traffic to origin over HTTP.

server {
    listen 80;
    listen [::]:80;
    server_name mail.example.com;

    set $origin_forwarded_proto $scheme;
    if ($http_x_forwarded_proto = "https") {
        set $origin_forwarded_proto https;
    }

    root /opt/domain-mail/frontend/dist;
    index index.html;

    access_log /var/log/nginx/domail.access.log;
    error_log /var/log/nginx/domail.error.log warn;

    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;

        add_header Cache-Control "no-store" always;
    }

    location ~* \.(?:js|mjs|css|map|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location / {
        # Direct HTTP visitors should still be upgraded to HTTPS.
        if ($http_x_forwarded_proto != "https") {
            return 301 https://$host$request_uri;
        }

        # When Cloudflare proxies an HTTPS visitor but connects to origin over HTTP
        # (for example Flexible mode), do not redirect back to HTTPS again.
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.example.com;

    ssl_certificate /etc/letsencrypt/live/mail.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:DoMailSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Trust Cloudflare proxy addresses so logs and upstream headers can use the real visitor IP.
    # Keep this list synced with Cloudflare official IP ranges.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    root /opt/domain-mail/frontend/dist;
    index index.html;

    access_log /var/log/nginx/domail.access.log;
    error_log /var/log/nginx/domail.error.log warn;

    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;

        add_header Cache-Control "no-store" always;
    }

    location ~* \.(?:js|mjs|css|map|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location / {
        # For React/Vite SPA, always fall back to `/index.html`.
        # Avoid `$uri/` here because `/` can resolve to the dist directory itself
        # and trigger `403 Forbidden` when directory listing is disabled.
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}