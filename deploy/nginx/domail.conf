# DoMail production site example.
# Replace `mail.example.com` with your real domain before enabling.
# This config serves only the current domain via `server_name`.
# Keep the 80 server for ACME challenge and HTTPS redirect.
# Ensure the certificate files exist before enabling the 443 server.
# Deploy the frontend build to a readable path such as `/opt/domain-mail/frontend/dist`.
# Do NOT use a path under `/root`, otherwise Nginx commonly returns 403 Forbidden.

server {
    listen 80;
    listen [::]:80;
    server_name mail.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mail.example.com;

    ssl_certificate /etc/letsencrypt/live/mail.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:DoMailSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/domain-mail/frontend/dist;
    index index.html;

    access_log /var/log/nginx/domail.access.log;
    error_log /var/log/nginx/domail.error.log warn;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        # For React/Vite SPA, always fall back to `/index.html`.
        # Avoid `$uri/` here because `/` can resolve to the dist directory itself
        # and trigger `403 Forbidden` when directory listing is disabled.
        try_files $uri /index.html;
    }
}