
# DoMail Docker 反向代理配置
# 容器内 Express 已服务前端静态文件 + API，nginx 仅做反向代理
# 数据库路径：容器内 /app/data/data.db（通过 volume domail-data:/app/data 持久化）

upstream domail_backend {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name mail.996668.xyz mail.ziiys.com;

    access_log /var/log/nginx/domail.access.log;
    error_log /var/log/nginx/domail.error.log warn;

    # HTTP → HTTPS 重定向（适配 Cloudflare Flexible 模式）
    set $redirect_to_https 1;
    if ($http_x_forwarded_proto = "https") {
        set $redirect_to_https 0;
    }
    if ($redirect_to_https) {
        return 301 https://$host$request_uri;
    }

    # Cloudflare Flexible 模式下流量已经是 HTTPS，直接代理
    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://domail_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.996668.xyz mail.ziiys.com;

    ssl_certificate     /etc/nginx/ssl/mail.996668.xyz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/mail.996668.xyz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:DoMailSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/domail.access.log;
    error_log /var/log/nginx/domail.error.log warn;

    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://domail_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }
}