version: '3.8'

services:
  domail:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domail
    restart: unless-stopped
    ports:
      # HTTP 仅监听本机，通过 nginx 反向代理域名访问
      - "127.0.0.1:3001:3001"
      # SMTP 接收端口（标准邮件端口，需对外暴露）
      - "25:25"
    environment:
      - NODE_ENV=production
      - HTTP_PORT=3001
      - SMTP_PORT=25
      - SMTP_HOST=0.0.0.0
      - DB_PATH=/app/data/data.db
      # --- 必须修改以下配置 ---
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=change-this-password
      - SESSION_SECRET=change-this-session-secret
      - SESSION_MAX_AGE_MS=43200000
      # 如果使用反向代理, 设置为你的域名
      - CORS_ORIGIN=http://localhost:3001
      # MX 主机名（用于 DNS 配置提示）
      - MAIL_MX_HOST=mx.example.com
    volumes:
      # 持久化 SQLite 数据库到宿主机目录
      - /root/DoMail/Data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
